<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('add_author') }}">Add Author</a>
        <a href="{{ url_for('add_book') }}">Add Book</a>
        <a href="{{ url_for('recommend_book') }}">Suggest Book</a>
    </nav>

    <h1>Library Collection</h1>

    <div class="controls">
        <form action="{{ url_for('home') }}" method="GET" style="display: inline-block; box-shadow: none; background: none; padding: 0;">
            <input type="text" name="search" placeholder="Search by title..." value="{{ search_query or '' }}" style="width: auto; display: inline;">
            <button type="submit" style="width: auto;">Search</button>
        </form>
        <p>Sort by:
            <a href="{{ url_for('home', sort='title', search=search_query) }}">Title</a> |
            <a href="{{ url_for('home', sort='author', search=search_query) }}">Author</a>
        </p>
    </div>

    <div class="book-list">
        {% for book in books %}
            <div class="book-card">
                <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg" alt="Book Cover">
                <h3><a href="{{ url_for('book_detail', book_id=book.id) }}">{{ book.title }}</a></h3>
                <p>by <a href="{{ url_for('author_detail', author_id=book.author.id) }}">{{ book.author.name }}</a></p>
                <form action="{{ url_for('delete_book', book_id=book.id) }}" method="POST">
                    <button type="submit" style="background-color: #e74c3c;">Delete</button>
                </form>
            </div>
        {% else %}
            <p>No books found.</p>
        {% endfor %}
    </div>
</body>
</html>
